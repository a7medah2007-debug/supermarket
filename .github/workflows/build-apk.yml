name: Build Supermarket VR APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. سحب الكود
        uses: actions/checkout@v4

      - name: 2. إعداد جافا
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. إعداد الأندرويد
        uses: android-actions/setup-android@v3

      - name: 4. تثبيت الأدوات
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: 5. تجهيز هيكل المشروع (Android Project Structure)
        run: |
          mkdir -p app/src/main/assets/libs
          mkdir -p app/src/main/assets/assets/models
          mkdir -p app/src/main/java/com/supermarket/mall
          mkdir -p app/src/main/res/values

          # نسخ ملفات الويب الأساسية
          cp index.html app/src/main/assets/
          cp style.css app/src/main/assets/ 2>/dev/null || true
          cp config.js app/src/main/assets/
          cp main.js app/src/main/assets/
          cp movement.js app/src/main/assets/
          cp interactions.js app/src/main/assets/

          # نسخ المكتبات (libs) والموديلات
          cp -r libs/* app/src/main/assets/libs/ 2>/dev/null || true
          cp -r assets/models/* app/src/main/assets/assets/models/ 2>/dev/null || true

      - name: 6. إنشاء ملفات إعداد الأندرويد (القوية)
        run: |
          # 1. ملف الـ Manifest
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.supermarket.mall">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="Supermarket VR"
                  android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 2. ملف الـ MainActivity (مع تفعيل الوصول للملفات)
          cat > app/src/main/java/com/supermarket/mall/MainActivity.java << 'EOF'
          package com.supermarket.mall;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.view.View;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  // السطرين السحريين لتشغيل الـ Modules محلياً
                  settings.setAllowFileAccessFromFileURLs(true);
                  settings.setAllowUniversalAccessFromFileURLs(true);
                  
                  webView.setWebViewClient(new WebViewClient());
                  webView.setSystemUiVisibility(View.SYSTEM_UI_FLAG_FULLSCREEN | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
                  
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          EOF

          # 3. ملفات Gradle
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > settings.gradle << 'EOF'
          rootProject.name = "SupermarketVR"
          include ':app'
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.supermarket.mall'
              compileSdk 34
              defaultConfig {
                  applicationId "com.supermarket.mall"
                  minSdk 29
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF
          
          echo "android.useAndroidX=true" > gradle.properties

      - name: 7. البناء (Build APK)
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. رفع الـ APK
        uses: actions/upload-artifact@v4
        with:
          name: Supermarket-VR-Fixed-App
          path: app/build/outputs/apk/debug/*.apk
