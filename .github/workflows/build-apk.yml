name: Build APK (WebView)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-latest.zip
          unzip -q commandlinetools-linux-latest.zip
          ls -la
          mv cmdline-tools latest || mv latest/cmdline-tools latest 2>/dev/null || true
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools" >> $GITHUB_ENV

      - name: Accept licenses
        run: yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Install SDK components
        run: |
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Create project structure
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/supermarket
          mkdir -p app/src/main/res/values

          cp *.html app/src/main/assets/ 2>/dev/null || true
          cp *.css app/src/main/assets/ 2>/dev/null || true
          cp *.js app/src/main/assets/ 2>/dev/null || true
          cp -r assets app/src/main/assets/ 2>/dev/null || true

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.supermarket.mall">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="Supermarket VR"
                  android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/supermarket/MainActivity.java << 'EOF'
          package com.supermarket.mall;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.view.View;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  webView.setWebViewClient(new WebViewClient());
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setDomStorageEnabled(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  webView.setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                  );
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          EOF

          echo '<resources><string name="app_name">Supermarket VR</string></resources>' > app/src/main/res/values/strings.xml

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.supermarket.mall'
              compileSdk 34
              defaultConfig {
                  applicationId "com.supermarket.mall"
                  minSdk 29
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies { implementation 'androidx.webkit:webkit:1.8.0' }
          EOF

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SupermarketMall"
          include ':app'
          EOF

          echo "android.useAndroidX=true" > gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Setup Gradle
        run: gradle wrapper --gradle-version 8.4

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Supermarket-VR-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
