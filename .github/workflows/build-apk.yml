name: Build Supermarket VR APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. سحب الكود
        uses: actions/checkout@v4

      - name: 2. إعداد جافا
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. إعداد الأندرويد
        uses: android-actions/setup-android@v3

      - name: 4. تثبيت الأدوات
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: 5. تجهيز المجلدات ونقل الملفات
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/supermarket/mall
          mkdir -p app/src/main/res/values

          # نسخ الملفات البرمجية والموديلات
          cp *.html app/src/main/assets/ 2>/dev/null || true
          cp *.css app/src/main/assets/ 2>/dev/null || true
          cp *.js app/src/main/assets/ 2>/dev/null || true
          cp -r assets app/src/main/assets/ 2>/dev/null || true

      - name: 6. إنشاء ملفات إعداد الأندرويد
        run: |
          # ملف الـ Manifest
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.supermarket.mall">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="Supermarket VR"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # ملف الـ MainActivity (محرك الـ WebView)
          cat > app/src/main/java/com/supermarket/mall/MainActivity.java << 'EOF'
          package com.supermarket.mall;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.view.View;

          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  webView.setWebViewClient(new WebViewClient());
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  
                  // وضع ملء الشاشة الكامل
                  webView.setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_LOW_PROFILE |
                      View.SYSTEM_UI_FLAG_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_LAYOUT_STABLE |
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY |
                      View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                  );
                  
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          EOF

          # ملف الـ Settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "SupermarketVR"
          include ':app'
          EOF

          # ملف الـ build.gradle (معدل للبناء السريع والتوقيع التلقائي)
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2'
          }
          android {
              namespace 'com.supermarket.mall'
              compileSdk 34
              defaultConfig {
                  applicationId "com.supermarket.mall"
                  minSdk 29
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  debug {
                      minifyEnabled false
                  }
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.8.0'
          }
          EOF

          echo "android.useAndroidX=true" > gradle.properties

      - name: 7. البناء والتوقيع (Build & Sign)
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          # استخدمنا assembleDebug لضمان وجود توقيع صالح للثبيت الفوري
          ./gradlew assembleDebug

      - name: 8. رفع الـ APK الجاهز للتثبيت
        uses: actions/upload-artifact@v4
        with:
          name: Supermarket-VR-Ready-To-Install
          path: app/build/outputs/apk/debug/*.apk
