# .github/workflows/build-apk.yml
name: Build WebView APK (Latest)

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # يسمح بالتشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-latest  # أحدث إصدار Ubuntu
    steps:
      # 1. سحب الكود (أحدث إصدار من الـ Action)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. تثبيت Java 17 (مطلوب لأحدث Android SDK)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. تثبيت Android SDK Command-line Tools (آخر إصدار)
      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          # تحميل أحدث إصدار من أدوات سطر الأوامر (دائمًا محدث)
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-latest.zip
          unzip -q commandlinetools-linux-latest.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools" >> $GITHUB_ENV

      # 4. قبول الترخيص وتثبيت مكونات البناء
      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 5. إنشاء هيكل مشروع Android
      - name: Create Android Project Structure
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/supermarket
          mkdir -p app/src/main/res/values

          # نسخ جميع ملفات المشروع إلى assets (بما فيها assets/Models)
          cp *.html app/src/main/assets/ 2>/dev/null || true
          cp *.css app/src/main/assets/ 2>/dev/null || true
          cp *.js app/src/main/assets/ 2>/dev/null || true
          # نسخ مجلد assets بأكمله (الموديلات، الأصوات، إلخ)
          cp -r assets app/src/main/assets/ 2>/dev/null || true

          # إنشاء AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.supermarket.mall">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="Supermarket VR"
                  android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # إنشاء MainActivity.java (WebView)
          cat > app/src/main/java/com/supermarket/MainActivity.java << 'EOF'
          package com.supermarket.mall;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.view.View;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  webView.setWebViewClient(new WebViewClient());
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setDomStorageEnabled(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  webView.setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                  );
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          EOF

          # إنشاء strings.xml
          echo '<resources><string name="app_name">Supermarket VR</string></resources>' > app/src/main/res/values/strings.xml

          # إنشاء build.gradle (باستخدام أحدث Gradle AGP)
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.supermarket.mall'
              compileSdk 34
              defaultConfig {
                  applicationId "com.supermarket.mall"
                  minSdk 29
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.webkit:webkit:1.8.0'
          }
          EOF

          # إنشاء settings.gradle وملفات gradle أخرى (أحدث إصدار)
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "SupermarketMall"
          include ':app'
          EOF

          # إنشاء gradle.properties
          echo "android.useAndroidX=true" > gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties

          # إنشاء local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      # 6. بناء الـ APK
      - name: Build APK
        run: |
          # تثبيت Gradle (نستخدم wrapper)
          gradle wrapper --gradle-version 8.4
          ./gradlew assembleRelease

      # 7. رفع الـ APK كـ artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Supermarket-VR-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
