<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Supermarket </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- شاشة التحميل -->
  <div id="loading-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s;">
    <div style="width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #FFD700; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
    <p style="color: white; font-family: Arial; font-size: 18px;">⏳ جاري تحميل المتجر...</p>
  </div>

  <!-- Canvas المشهد -->
  <canvas id="game-canvas"></canvas>

  <!-- Three.js Import Map -->
  <script type="importmap">
  {
    "imports": {
      "three": "./libs/three.module.js",
      "three/addons/loaders/GLTFLoader.js": "./libs/GLTFLoader.js",
      "three/addons/webxr/VRButton.js": "./libs/VRButton.js",
      "three/addons/webxr/XRControllerModelFactory.js": "./libs/XRControllerModelFactory.js"
    }
  }
</script>

  <!-- ملفات JavaScript -->
    <script type="module" src="./main.js"></script>
</body>
</html>
